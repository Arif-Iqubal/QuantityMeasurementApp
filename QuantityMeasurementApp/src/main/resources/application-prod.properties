#Application Configuration Properties

spring.application.name=QuantityMeasurementApp
server.port=8080

# MySQL Database (Production)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/quantity_measurement
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Arif@123

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Fix the Logging (so you can actually see the "Started" message)
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG

# Actuator

management.endpoints.web.exposure.include=health, metrics